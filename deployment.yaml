apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - name: vote
        image: nehalwandhare/vote:748269a24e0593863e1524d4b91a5f2b7f79f726
        ports:
        - containerPort: 80

        # 🔥 ADD THIS
        env:
        - name: REDIS_HOST
          value: "redis"

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
